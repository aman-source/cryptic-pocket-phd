[project]
name = "cryptic-pocket-phd"
version = "0.1.0"
description = "PocketMiner-guided diffusion for cryptic pockets"
requires-python = ">=3.10"

dependencies = [
    "numpy",
    "scipy",
    "pandas",
    "biopython",
    "wandb",
    "matplotlib",
    "seaborn",
    "pyyaml",
    "requests",
    "tqdm",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-cov",
    "ipython",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cryptic_pocket_phd"]

[tool.uv]
dev-dependencies = [
    "pytest",
    "pytest-cov",
]
